name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "android/**"
      - "ios/**"
      - "package.json"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "android/**"
      - "ios/**"
      - "package.json"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
