plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.phonenumberhint'
version = '0.3.0'

android {
  namespace "expo.modules.phonenumberhint"
  defaultConfig {
    versionCode 1
    versionName "0.3.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "com.google.android.gms:play-services-auth:21.5.1"
}
